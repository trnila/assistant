name: build
on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7.2.0
        with:
          platforms: linux/aarch64,linux/amd64
          tags: ghcr.io/trnila/assistant:latest,ghcr.io/trnila/assistant:${{ github.sha }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/delete-package-versions@v5
        with:
          package-name: assistant
          package-type: container
          min-versions-to-keep: 10

  deploy:
    if: github.repository == 'trnila/assistant'
    runs-on: ubuntu-latest
    needs: build
    concurrency: deploy
    steps:
      - run: 'curl -X POST --fail -s -H"Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" https://trnila.eu/hooks/assistant'

  deploy_nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: trnila/test_infra
          ref: main
      - run: git config user.name "Trnila bot"
      - run: git config user.email "bot@trnila.eu"
      - run: sed -i -E "s#ghcr.io/trnila/assistant:[^\"]+#ghcr.io/trnila/assistant:${{ github.sha }}#g" configuration.nix
      - run: git add configuration.nix
      - run: git commit -m "Update assistant container to ${{ github.sha }}"
      - run: git push
