name: build
on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7.2.0
        with:
          platforms: linux/aarch64,linux/amd64
          tags: ghcr.io/trnila/assistant:latest,ghcr.io/trnila/assistant:${{ github.sha }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/delete-package-versions@v5
        with:
          package-name: assistant
          package-type: container
          min-versions-to-keep: 10

  deploy:
    if: github.repository == 'trnila/assistant'
    runs-on: ubuntu-latest
    needs: build
    concurrency: deploy
    steps:
      - run: 'curl -X POST --fail -s -H"Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" https://trnila.eu/hooks/assistant'

  deploy_nix:
    runs-on: ubuntu-latest
    env:
      INFRA_REPO: trnila/nixos_pi
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: ${{ env.INFRA_REPO }}
      - name: Trigger workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run update_flake.yml \
            --repo ${{ env.INFRA_REPO }} \
            --ref master \
            -f input="assistant" \
            -f rev="github:${{ github.repository }}/${{ github.sha }}"
