name: build
on:
  workflow_dispatch:
  push:

jobs:
  deploy_nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: trnila/test_infra
      - name: Trigger workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run update_flake.yml \
            --repo trnila/test_infra \
            --ref main \
            -f input="nixpkgs" \
            -f rev="github:NixOS/nixpkgs/c326d7aede3170da1a92ec9af0be1c3a28c25a64"
