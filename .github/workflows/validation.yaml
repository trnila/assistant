name: Validation

on:
    workflow_dispatch:
    push:
    pull_request:

jobs:
  precommit:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    steps:
    - uses: actions/checkout@v7
    - uses: astral-sh/setup-uv@v8.3.0
    - uses: j178/prek-action@v2

  build_frontend:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    steps:
      - uses: actions/checkout@v7
      - run: cd frontend && yarn install && yarn run build

  test_cli:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: sudo apt update && sudo apt install -y poppler-utils tesseract-ocr
      - name: Run tests
        run: uv run ./lunches.py

  test_fullstack:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y docker-compose
      - run: LOG_LEVEL=debug docker-compose up -d --build
      - run: npm install -D @playwright/test@latest
      - run: npx playwright install --with-deps
      - run: npx playwright test --reporter=html
      - run: docker-compose logs --timestamps
        if: ${{ !cancelled() }}
      - run: curl http://localhost:8000/lunch.json
        if: ${{ !cancelled() }}
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
